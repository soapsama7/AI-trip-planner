spring:
  application:
    name: AI-trip-planner-backend
  datasource:
    url: 
    username: ${MYSQL_USERNAME:}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: 
  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 5s
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:}
          temperature: ${DEEPSEEK_TEMPERATURE:0.7}
          max-tokens: ${DEEPSEEK_MAX_TOKENS:4096}

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

qweather:
  api-key: ${QWEATHER_API_KEY:}
  api-host: ${QWEATHER_API_HOST:}

amap:
  base-url: ${AMAP_BASE_URL:}
  web-key: ${AMAP_WEB_KEY:}

server:
  port: 8080

# OpenAPI / Swagger UI（springdoc-openapi）
springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
